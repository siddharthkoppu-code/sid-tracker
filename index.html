<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://lucide.dev/external/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a;
        }
        .animate-slide { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Smooth transitions for chart interactions */
        .pie-slice { transition: all 0.3s ease; stroke-linejoin: round; }
        .pie-slice:hover { filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.15)); transform: scale(1.02); transform-origin: center; }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Color palette matching standard financial app categorization
        const CATEGORY_COLORS = {
          'Food & Dining': '#ef4444',     // Red
          'Transport': '#3b82f6',         // Blue
          'Rent & Bills': '#f59e0b',      // Amber
          'Entertainment': '#8b5cf6',     // Purple
          'Shopping': '#ec4899',          // Pink
          'Others': '#64748b'             // Slate
        };

        const Icon = ({ name, size = 18, className = "" }) => (
            <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
        );

        function App() {
            // --- Core App State ---
            const [transactions, setTransactions] = useState([
                { id: 1, title: 'Grocery Run', amount: 1200, category: 'Food & Dining', type: 'expense', date: '2026-05-20' },
                { id: 2, title: 'Monthly Rent', amount: 12000, category: 'Rent & Bills', type: 'expense', date: '2026-05-01' },
                { id: 3, title: 'Uber Ride', amount: 450, category: 'Transport', type: 'expense', date: '2026-05-22' },
                { id: 4, title: 'Movie Tickets', amount: 800, category: 'Entertainment', type: 'expense', date: '2026-05-23' }
            ]);

            // --- Form Inputs ---
            const [title, setTitle] = useState('');
            const [amount, setAmount] = useState('');
            const [category, setCategory] = useState('Food & Dining');

            useEffect(() => {
                lucide.createIcons();
            }, [transactions]);

            // --- Calculation Engine ---
            const totals = useMemo(() => {
                return transactions.reduce((acc, current) => {
                    acc.expense += Number(current.amount);
                    return acc;
                }, { expense: 0 });
            }, [transactions]);

            const categoryData = useMemo(() => {
                const breakdown = {};
                // Initialize categories to make sure they display in legends smoothly
                Object.keys(CATEGORY_COLORS).forEach(cat => breakdown[cat] = 0);
                
                transactions.forEach(t => {
                    breakdown[t.category] = (breakdown[t.category] || 0) + Number(t.amount);
                });

                return Object.entries(breakdown)
                    .map(([name, value]) => ({
                        name,
                        value,
                        percentage: totals.expense > 0 ? Math.round((value / totals.expense) * 100) : 0,
                        color: CATEGORY_COLORS[name]
                    }))
                    .filter(item => item.value > 0); // Only chart active parameters
            }, [transactions, totals.expense]);

            // --- Native SVG Pie Chart Component Engine ---
            const PieChartSVG = () => {
                if (categoryData.length === 0) {
                    return (
                        <div className="h-48 w-48 rounded-full border-4 border-dashed border-slate-200 flex items-center justify-center mx-auto">
                            <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">No Data</span>
                        </div>
                    );
                }

                let accumulatedAngle = 0;
                
                return (
                    <svg viewBox="0 0 100 100" className="w-48 h-48 mx-auto overflow-visible">
                        {categoryData.map((slice, i) => {
                            const angle = (slice.value / totals.expense) * 360;
                            
                            // Handling edge-case single item 100% donut fill trick
                            if (angle === 360) {
                                return (
                                    <circle key={i} cx="50" cy="50" r="40" fill="none" stroke={slice.color} strokeWidth="18" />
                                );
                            }

                            // Math conversions for coordinate path placements
                            const x1 = 50 + 40 * Math.cos((accumulatedAngle - 90) * Math.PI / 180);
                            const y1 = 50 + 40 * Math.sin((accumulatedAngle - 90) * Math.PI / 180);
                            
                            accumulatedAngle += angle;
                            
                            const x2 = 50 + 40 * Math.cos((accumulatedAngle - 90) * Math.PI / 180);
                            const y2 = 50 + 40 * Math.sin((accumulatedAngle - 90) * Math.PI / 180);
                            
                            const largeArcFlag = angle > 180 ? 1 : 0;
                            const pathData = `M ${x1} ${y1} A 40 40 0 ${largeArcFlag} 1 ${x2} ${y2}`;

                            return (
                                <path 
                                    key={i}
                                    d={pathData}
                                    fill="none"
                                    stroke={slice.color}
                                    strokeWidth="16"
                                    className="pie-slice cursor-pointer"
                                />
                            );
                        })}
                        {/* Centered balance tracking display label inside the donut chart */}
                        <circle cx="50" cy="50" r="28" fill="white" />
                        <text x="50" y="47" textAnchor="middle" className="text-[7px] font-extrabold fill-slate-400 uppercase tracking-widest">Spent</text>
                        <text x="50" y="56" textAnchor="middle" className="text-[10px] font-black fill-slate-900">₹{totals.expense}</text>
                    </svg>
                );
            };

            // --- Action Methods ---
            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!title || !amount) return;

                const newTx = {
                    id: Date.now(),
                    title,
                    amount: Math.abs(Number(amount)),
                    category,
                    type: 'expense',
                    date: new Date().toISOString().split('T')[0]
                };

                setTransactions([newTx, ...transactions]);
                setTitle('');
                setAmount('');
            };

            const handleDeleteTransaction = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Top Branding Bar */}
                    <header className="bg-white border-b border-slate-200 px-6 py-4 mb-8 sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2.5">
                                <div className="bg-slate-900 p-2 rounded-xl text-white">
                                    <Icon name="activity" size={18} />
                                </div>
                                <h1 className="font-black text-sm tracking-widest uppercase">TRACKER // CORE</h1>
                            </div>
                            <span className="text-[10px] bg-slate-100 font-bold px-3 py-1 rounded-full text-slate-500 uppercase tracking-wider">Active Workspace</span>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 grid grid-cols-1 md:grid-cols-12 gap-8">
                        {/* LEFT COLUMN: Data Entry & Visualization Metrics */}
                        <div className="md:col-span-5 space-y-6">
                            
                            {/* Interactive Pie Chart Dynamic Module */}
                            <div className="bg-white border border-slate-200 rounded-[2rem] p-6 shadow-sm">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-wider mb-6">Asset Matrix Distribution</h2>
                                <div className="py-2">
                                    <PieChartSVG />
                                </div>
                                
                                {/* Dynamic Legend Breakdown */}
                                <div className="mt-6 space-y-2.5">
                                    {categoryData.map((item, index) => (
                                        <div key={index} className="flex items-center justify-between text-xs font-bold text-slate-600 animate-slide">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: item.color }}></div>
                                                <span>{item.name}</span>
                                            </div>
                                            <span className="text-slate-400">₹{item.value} <span className="text-[10px] text-slate-300 ml-1">({item.percentage}%)</span></span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Standard Ingestion Input Form */}
                            <div className="bg-white border border-slate-200 rounded-[2rem] p-6 shadow-sm">
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider mb-4">Record New Settlement</h3>
                                <form onSubmit={handleAddTransaction} className="space-y-4">
                                    <input required type="text" placeholder="Transaction Descriptor" className="w-full bg-slate-50 border border-slate-100 p-3.5 rounded-xl text-xs font-bold outline-none focus:border-slate-300 transition-colors" value={title} onChange={e => setTitle(e.target.value)}/>
                                    <input required type="number" placeholder="Value Amount (INR)" className="w-full bg-slate-50 border border-slate-100 p-3.5 rounded-xl text-xs font-bold outline-none focus:border-slate-300 transition-colors" value={amount} onChange={e => setAmount(e.target.value)}/>
                                    <select className="w-full bg-slate-50 border border-slate-100 p-3.5 rounded-xl text-xs font-bold outline-none cursor-pointer" value={category} onChange={e => setCategory(e.target.value)}>
                                        {Object.keys(CATEGORY_COLORS).map(cat => <option key={cat}>{cat}</option>)}
                                    </select>
                                    <button type="submit" className="w-full bg-slate-900 text-white font-black text-xs py-4 rounded-xl hover:bg-slate-800 tracking-widest uppercase transition-all">Execute Insertion</button>
                                </form>
                            </div>
                        </div>

                        {/* RIGHT COLUMN: The Historical Ledger Streams */}
                        <div className="md:col-span-7 bg-white border border-slate-200 rounded-[2rem] p-6 shadow-sm flex flex-col h-fit">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider">Transaction Registry Stream</h3>
                                <span className="text-[10px] text-slate-400 font-bold tracking-tight">{transactions.length} Total Units</span>
                            </div>

                            <div className="space-y-3 max-h-[560px] overflow-y-auto pr-1">
                                {transactions.length === 0 ? (
                                    <div className="text-center py-16 text-slate-400 text-xs font-bold uppercase tracking-wider">No active entries inside node.</div>
                                ) : transactions.map(item => (
                                    <div key={item.id} className="flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl group transition-all hover:border-slate-200 animate-slide">
                                        <div className="flex items-center gap-3.5">
                                            {/* Left color pill identifier element matching the graph mappings */}
                                            <div className="w-1.5 h-8 rounded-full" style={{ backgroundColor: CATEGORY_COLORS[item.category] }}></div>
                                            <div>
                                                <h4 className="text-xs font-black text-slate-800 leading-tight">{item.title}</h4>
                                                <span className="text-[9px] font-bold text-slate-400 uppercase mt-0.5 block tracking-tight">{item.category}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center gap-4">
                                            <span className="text-xs font-extrabold text-slate-900">-₹{item.amount}</span>
                                            <button 
                                                onClick={() => handleDeleteTransaction(item.id)}
                                                className="text-slate-300 hover:text-red-500 p-1.5 hover:bg-red-50 rounded-lg transition-colors opacity-100 md:opacity-0 group-hover:opacity-100"
                                            >
                                                <Icon name="trash-2" size={15} />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
