<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Expense Tracker with Pie Chart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://lucide.dev/external/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a;
        }
        .animate-slide { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Premium custom drop shadows */
        .premium-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.02), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const CATEGORY_COLORS = {
          'Food & Dining': '#ef4444',     // Red
          'Transport': '#3b82f6',         // Blue
          'Rent & Bills': '#f59e0b',      // Amber
          'Entertainment': '#8b5cf6',     // Purple
          'Shopping': '#ec4899',          // Pink
          'Others': '#64748b'             // Slate
        };

        const Icon = ({ name, size = 18, className = "" }) => (
            <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
        );

        function App() {
            // --- Sample Data ---
            const [transactions, setTransactions] = useState([
                { id: 1, title: 'Grocery Run', amount: 1200, category: 'Food & Dining', date: '2026-05-20' },
                { id: 2, title: 'Monthly Rent', amount: 12000, category: 'Rent & Bills', date: '2026-05-01' },
                { id: 3, title: 'Uber Ride', amount: 850, category: 'Transport', date: '2026-05-22' },
                { id: 4, title: 'Movie Tickets', amount: 1500, category: 'Entertainment', date: '2026-05-23' },
                { id: 5, title: 'Sneakers Buy', amount: 3200, category: 'Shopping', date: '2026-05-23' }
            ]);

            // --- Form Inputs ---
            const [title, setTitle] = useState('');
            const [amount, setAmount] = useState('');
            const [category, setCategory] = useState('Food & Dining');

            useEffect(() => {
                lucide.createIcons();
            }, [transactions]);

            // --- Total Expenses calculation ---
            const totalExpense = useMemo(() => {
                return transactions.reduce((sum, item) => sum + Number(item.amount), 0);
            }, [transactions]);

            // --- Category Allocation Calculations ---
            const categoryBreakdown = useMemo(() => {
                const breakdown = {};
                transactions.forEach(t => {
                    breakdown[t.category] = (breakdown[t.category] || 0) + Number(t.amount);
                });

                let accumulatedPercent = 0;
                return Object.entries(breakdown).map(([name, value]) => {
                    const percentage = totalExpense > 0 ? (value / totalExpense) * 100 : 0;
                    const startPercent = accumulatedPercent;
                    accumulatedPercent += percentage;
                    return {
                        name,
                        value,
                        percentage: Math.round(percentage),
                        startPercent,
                        endPercent: accumulatedPercent,
                        color: CATEGORY_COLORS[name] || '#64748b'
                    };
                });
            }, [transactions, totalExpense]);

            // --- Conic Gradient string for dynamic CSS Pie Chart ---
            const pieChartStyle = useMemo(() => {
                if (categoryBreakdown.length === 0 || totalExpense === 0) {
                    return { background: '#e2e8f0' }; // Empty state gray circle
                }
                const gradientSegments = categoryBreakdown.map(cat => 
                    `${cat.color} ${cat.startPercent}% ${cat.endPercent}%`
                );
                return {
                    background: `conic-gradient(${gradientSegments.join(', ')})`
                };
            }, [categoryBreakdown, totalExpense]);

            // --- Actions ---
            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!title || !amount) return;

                const newTx = {
                    id: Date.now(),
                    title,
                    amount: Math.abs(Number(amount)),
                    category,
                    date: new Date().toISOString().split('T')[0]
                };

                setTransactions([newTx, ...transactions]);
                setTitle('');
                setAmount('');
            };

            const handleDeleteTransaction = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
            };

            return (
                <div className="min-h-screen pb-16">
                    {/* Header bar */}
                    <header className="bg-white border-b border-slate-100 px-6 py-4 mb-8 sticky top-0 z-15">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-slate-900 p-2.5 rounded-xl text-white">
                                    <Icon name="wallet" size={20} />
                                </div>
                                <h1 className="font-extrabold text-base tracking-wider uppercase">LEDGER CORE</h1>
                            </div>
                            <span className="text-[10px] bg-slate-100 font-bold px-3 py-1.5 rounded-xl text-slate-500 uppercase tracking-widest">PRO EDITION</span>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 grid grid-cols-1 md:grid-cols-12 gap-8">
                        {/* LEFT COLUMN: Input Form & Interactive Pie Chart */}
                        <div className="md:col-span-5 space-y-6">
                            
                            {/* GUARANTEED PIE CHART COMPONENT (Donut style) */}
                            <div className="bg-white border border-slate-100 rounded-[2rem] p-6 premium-shadow">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Expense Allocation Map</h2>
                                
                                <div className="relative flex items-center justify-center py-4">
                                    {/* The Pie Chart Slice Circle */}
                                    <div 
                                        style={pieChartStyle}
                                        className="w-44 h-44 rounded-full relative shadow-inner flex items-center justify-center transition-all duration-500"
                                    >
                                        {/* Donut Center Mask */}
                                        <div className="w-32 h-32 rounded-full bg-white flex flex-col items-center justify-center shadow-md">
                                            <span className="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest leading-none mb-1">TOTAL OUTFLOW</span>
                                            <span className="text-2xl font-black text-slate-900 tracking-tight">₹{totalExpense}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Dynamic Legend breakdowns with colorful pills */}
                                <div className="mt-8 space-y-3">
                                    {categoryBreakdown.length === 0 ? (
                                        <p className="text-xs text-center text-slate-400 font-bold py-2 uppercase">No allocation logged</p>
                                    ) : (
                                        categoryBreakdown.map((item, index) => (
                                            <div key={index} className="flex items-center justify-between text-xs font-bold text-slate-600 animate-slide">
                                                <div className="flex items-center gap-2.5">
                                                    <div className="w-3 h-3 rounded-full shadow-sm" style={{ backgroundColor: item.color }}></div>
                                                    <span className="text-slate-800">{item.name}</span>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-slate-900">₹{item.value}</span>
                                                    <span className="text-[10px] text-slate-400 font-medium ml-1.5">({item.percentage}%)</span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                            {/* Transaction Ingest Form */}
                            <div className="bg-white border border-slate-100 rounded-[2rem] p-6 premium-shadow">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Add Transaction</h3>
                                <form onSubmit={handleAddTransaction} className="space-y-4">
                                    <input required type="text" placeholder="Description" className="w-full bg-slate-50 border border-transparent p-3.5 rounded-xl text-xs font-bold outline-none focus:border-slate-200 transition-colors" value={title} onChange={e => setTitle(e.target.value)}/>
                                    <input required type="number" placeholder="Value (INR)" className="w-full bg-slate-50 border border-transparent p-3.5 rounded-xl text-xs font-bold outline-none focus:border-slate-200 transition-colors" value={amount} onChange={e => setAmount(e.target.value)}/>
                                    <select className="w-full bg-slate-50 border border-transparent p-3.5 rounded-xl text-xs font-bold outline-none cursor-pointer" value={category} onChange={e => setCategory(e.target.value)}>
                                        {Object.keys(CATEGORY_COLORS).map(cat => <option key={cat}>{cat}</option>)}
                                    </select>
                                    <button type="submit" className="w-full bg-slate-900 text-white font-black text-xs py-4 rounded-xl hover:bg-slate-800 tracking-widest uppercase transition-all shadow-md">Add Transaction</button>
                                </form>
                            </div>
                        </div>

                        {/* RIGHT COLUMN: Ledger Records list */}
                        <div className="md:col-span-7 bg-white border border-slate-100 rounded-[2rem] p-6 premium-shadow flex flex-col h-fit">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Statements</h3>
                                <span className="text-[10px] text-slate-400 font-bold">{transactions.length} Records</span>
                            </div>

                            <div className="space-y-3 max-h-[560px] overflow-y-auto pr-1">
                                {transactions.length === 0 ? (
                                    <div className="text-center py-20 text-slate-400 text-xs font-bold uppercase tracking-widest">Ledger database empty</div>
                                ) : transactions.map(item => (
                                    <div key={item.id} className="flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl group transition-all hover:bg-white hover:border-slate-200 animate-slide">
                                        <div className="flex items-center gap-3.5">
                                            <div className="w-1.5 h-8 rounded-full" style={{ backgroundColor: CATEGORY_COLORS[item.category] || '#64748b' }}></div>
                                            <div>
                                                <h4 className="text-xs font-black text-slate-800 leading-tight">{item.title}</h4>
                                                <span className="text-[9px] font-bold text-slate-400 uppercase mt-0.5 block">{item.category}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center gap-4">
                                            <span className="text-xs font-black text-slate-900">-₹{item.amount}</span>
                                            <button 
                                                onClick={() => handleDeleteTransaction(item.id)}
                                                className="text-slate-300 hover:text-red-500 p-2 hover:bg-red-50 rounded-lg transition-colors"
                                            >
                                                <Icon name="trash-2" size={15} />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
