<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Expense Tracker with Vector PDF Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/jspdf-autotable@3.6.0/dist/jspdf.plugin.autotable.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a;
        }
        .animate-slide { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .premium-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.02), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const CATEGORY_COLORS = {
          'Food & Dining': '#ef4444',     // Red
          'Transport': '#3b82f6',         // Blue
          'Rent & Bills': '#f59e0b',      // Amber
          'Entertainment': '#8b5cf6',     // Purple
          'Shopping': '#ec4899',          // Pink
          'Others': '#64748b'             // Slate
        };

        // Native SVGs to maintain stability without script-loading breaks
        const TrashIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
        );

        const PieIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
        );

        const FileTextIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" class="mr-1.5"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
        );

        // --- Custom Canvas Pie Chart (For Dashboard Screen Viewport) ---
        function DynamicCanvasChart({ data, total }) {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                const size = 200;
                canvas.width = size * 2;
                canvas.height = size * 2;
                canvas.style.width = `${size}px`;
                canvas.style.height = `${size}px`;
                ctx.scale(2, 2);

                const centerX = size / 2;
                const centerY = size / 2;
                const radius = 80;

                ctx.clearRect(0, 0, size, size);

                if (data.length === 0 || total === 0) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                    ctx.fillStyle = '#f1f5f9';
                    ctx.fill();
                    ctx.lineWidth = 15;
                    ctx.strokeStyle = '#e2e8f0';
                    ctx.stroke();
                    return;
                }

                let startAngle = -0.5 * Math.PI;

                data.forEach(slice => {
                    const sliceAngle = (slice.value / total) * 2 * Math.PI;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
                    ctx.closePath();
                    ctx.fillStyle = slice.color;
                    ctx.fill();
                    startAngle += sliceAngle;
                });

                ctx.beginPath();
                ctx.arc(centerX, centerY, radius - 24, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.strokeStyle = '#f1f5f9';
                ctx.stroke();
            }, [data, total]);

            return (
                <div className="relative flex items-center justify-center">
                    <canvas ref={canvasRef} className="z-10" />
                    <div className="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none">
                        <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">OUTFLOW</span>
                        <span className="text-xl font-black text-slate-900">₹{total}</span>
                    </div>
                </div>
            );
        }

        function App() {
            const [transactions, setTransactions] = useState([
                { id: 1, title: 'Weekly Grocery', amount: 1500, category: 'Food & Dining', date: '2026-05-20' },
                { id: 2, title: 'House Maintenance', amount: 8000, category: 'Rent & Bills', date: '2026-05-01' },
                { id: 3, title: 'Metro Ticket', amount: 250, category: 'Transport', date: '2026-05-22' },
                { id: 4, title: 'Streaming Subscriptions', amount: 990, category: 'Entertainment', date: '2026-05-23' },
                { id: 5, title: 'Premium Coffee Maker', amount: 4800, category: 'Shopping', date: '2026-05-24' }
            ]);

            const [title, setTitle] = useState('');
            const [amount, setAmount] = useState('');
            const [category, setCategory] = useState('Food & Dining');

            const totalExpense = useMemo(() => {
                return transactions.reduce((sum, item) => sum + Number(item.amount), 0);
            }, [transactions]);

            const categoryBreakdown = useMemo(() => {
                const breakdown = {};
                transactions.forEach(t => {
                    breakdown[t.category] = (breakdown[t.category] || 0) + Number(t.amount);
                });

                return Object.entries(breakdown).map(([name, value]) => ({
                    name,
                    value,
                    percentage: totalExpense > 0 ? Math.round((value / totalExpense) * 100) : 0,
                    color: CATEGORY_COLORS[name] || '#64748b'
                })).sort((a, b) => b.value - a.value);
            }, [transactions, totalExpense]);

            // --- ADVANCED NATIVE PDF GENERATION WITH EMBEDDED PIE CHART ---
            const exportToPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
                
                // Styling Parameters
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(22);
                doc.textColor = 15, 23, 42; // Slate 900
                doc.text("FINANCIAL OUTFLOW REPORT", 14, 20);
                
                doc.setFontSize(9);
                doc.setFont("Helvetica", "normal");
                doc.textColor = 148, 163, 184; // Slate 400
                doc.text(`GENERATED: ${new Date().toISOString().split('T')[0]} // CORE SECURE ENGINE`, 14, 26);
                
                // Divider line
                doc.setDrawColor(226, 232, 240);
                doc.setLineWidth(0.5);
                doc.line(14, 30, 196, 30);

                // --- VECTOR PIE CHART DRAW ENGINE FOR PDF ---
                if (categoryBreakdown.length > 0) {
                    const chartX = 150;
                    const chartY = 55;
                    const chartRadius = 25;
                    let currentAngle = -Math.PI / 2; // Start position at 12 o'clock

                    categoryBreakdown.forEach(slice => {
                        const sliceAngle = (slice.value / totalExpense) * 2 * Math.PI;
                        
                        // Parse hex strings into single integer RGB objects 
                        const hex = slice.color.replace('#', '');
                        const r = parseInt(hex.substring(0, 2), 16);
                        const g = parseInt(hex.substring(2, 4), 16);
                        const b = parseInt(hex.substring(4, 6), 16);

                        // Render the filled pie sector vectors directly into the PDF instance
                        doc.setFillColor(r, g, b);
                        doc.pieSlice(chartX, chartY, 0, chartRadius, currentAngle, currentAngle + sliceAngle, 'F');
                        
                        currentAngle += sliceAngle;
                    });

                    // Draw inner ring cover mask to transform vector section into an elegant donut look
                    doc.setFillColor(255, 255, 255);
                    doc.circle(chartX, chartY, chartRadius - 8, 'F');

                    // Center Metrics Labels within Document Matrix
                    doc.setFont("Helvetica", "bold");
                    doc.setFontSize(7);
                    doc.textColor = 100, 116, 139;
                    doc.text("TOTAL SPENT", chartX, chartY - 2, { align: "center" });
                    doc.setFontSize(10);
                    doc.textColor = 15, 23, 42;
                    doc.text(`INR ${totalExpense}`, chartX, chartY + 3, { align: "center" });
                }

                // Balance Box Card Left Section Metrics
                doc.setFillColor(248, 250, 252); // Slate 50
                doc.roundedRect(14, 36, 95, 38, 4, 4, 'F');
                
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(8);
                doc.textColor = 100, 116, 139;
                doc.text("TOTAL SETTLED CAPITAL", 20, 46);
                
                doc.setFontSize(20);
                doc.textColor = 79, 70, 229; // Indigo 600
                doc.text(`Rs. ${totalExpense}`, 20, 58);

                // Build Table Structure data mapping arrays
                const tableRows = transactions.map((t, idx) => [
                    idx + 1,
                    t.date,
                    t.title,
                    t.category,
                    `Rs. ${t.amount}`
                ]);

                // Render Table Stream onto document canvas via autotable hook
                doc.autoTable({
                    startY: 85,
                    head: [['ID', 'Date', 'Description', 'Allocation Category', 'Value']],
                    body: tableRows,
                    theme: 'striped',
                    headStyles: { 
                        fillColor: [15, 23, 42], 
                        fontSize: 8, 
                        fontStyle: 'bold',
                        halign: 'left'
                    },
                    bodyStyles: { 
                        fontSize: 8,
                        textColor: [51, 65, 85]
                    },
                    columnStyles: {
                        4: { halign: 'right', fontStyle: 'bold' } // Right align our financial parameters 
                    },
                    margin: { left: 14, right: 14 }
                });

                // Save PDF locally 
                doc.save(`Financial_Statement_${new Date().toISOString().split('T')[0]}.pdf`);
            };

            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!title || !amount) return;

                const newTx = {
                    id: Date.now(),
                    title,
                    amount: Math.abs(Number(amount)),
                    category,
                    date: new Date().toISOString().split('T')[0]
                };

                setTransactions([newTx, ...transactions]);
                setTitle('');
                setAmount('');
            };

            const handleDeleteTransaction = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
            };

            return (
                <div className="min-h-screen pb-16">
                    <header className="bg-white border-b border-slate-100 px-6 py-4 mb-8 sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-slate-900 p-2.5 rounded-xl text-white flex items-center justify-center">
                                    <PieIcon />
                                </div>
                                <h1 className="font-extrabold text-base tracking-wider uppercase">LEDGER CORE</h1>
                            </div>
                            <span className="text-[10px] bg-slate-100 font-bold px-3 py-1.5 rounded-xl text-slate-500 uppercase tracking-widest">ACTIVE HARMONY</span>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 grid grid-cols-1 md:grid-cols-12 gap-8">
                        <div className="md:col-span-5 space-y-6">
                            <div className="bg-white border border-slate-100 rounded-[2.5rem] p-6 premium-shadow">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Visual Allocation Map</h2>
                                <div className="py-2">
                                    <DynamicCanvasChart data={categoryBreakdown} total={totalExpense} />
                                </div>
                                <div className="mt-6 space-y-3">
                                    {categoryBreakdown.length === 0 ? (
                                        <p className="text-xs text-center text-slate-400 font-bold py-2 uppercase">No Allocations Made</p>
                                    ) : (
                                        categoryBreakdown.map((item, index) => (
                                            <div key={index} className="flex items-center justify-between text-xs font-bold text-slate-600 animate-slide">
                                                <div className="flex items-center gap-2.5">
                                                    <div className="w-3 h-3 rounded-full shadow-sm" style={{ backgroundColor: item.color }}></div>
                                                    <span className="text-slate-800">{item.name}</span>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-slate-900 font-bold">₹{item.value}</span>
                                                    <span className="text-[10px] text-slate-400 font-medium ml-1.5">({item.percentage}%)</span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                            <div className="bg-white border border-slate-100 rounded-[2.5rem] p-6 premium-shadow">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Add Transaction</h3>
                                <form onSubmit={handleAddTransaction} className="space-y-4">
                                    <input required type="text" placeholder="Description" className="w-full bg-slate-50 border border-transparent p-4 rounded-2xl text-xs font-bold outline-none focus:border-slate-200 transition-colors" value={title} onChange={e => setTitle(e.target.value)}/>
                                    <input required type="number" placeholder="Value (INR)" className="w-full bg-slate-50 border border-transparent p-4 rounded-2xl text-xs font-bold outline-none focus:border-slate-200 transition-colors" value={amount} onChange={e => setAmount(e.target.value)}/>
                                    <select className="w-full bg-slate-50 border border-transparent p-4 rounded-2xl text-xs font-bold outline-none cursor-pointer" value={category} onChange={e => setCategory(e.target.value)}>
                                        {Object.keys(CATEGORY_COLORS).map(cat => <option key={cat}>{cat}</option>)}
                                    </select>
                                    <button type="submit" className="w-full bg-indigo-600 text-white font-black text-xs py-4.5 rounded-2xl hover:bg-indigo-700 tracking-widest uppercase transition-all shadow-md">Execute Insertion</button>
                                </form>
                            </div>
                        </div>

                        <div className="md:col-span-7 bg-white border border-slate-100 rounded-[2.5rem] p-6 premium-shadow flex flex-col h-fit">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Statements</h3>
                                
                                <button 
                                    onClick={exportToPDF}
                                    className="flex items-center bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-700 px-3 py-1.5 rounded-xl text-[10px] font-black tracking-wider uppercase transition-colors"
                                >
                                    <FileTextIcon /> Export PDF
                                </button>
                            </div>

                            <div className="space-y-3 max-h-[560px] overflow-y-auto pr-1">
                                {transactions.length === 0 ? (
                                    <div className="text-center py-20 text-slate-400 text-xs font-bold uppercase tracking-widest">Ledger database empty</div>
                                ) : transactions.map(item => (
                                    <div key={item.id} className="flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl group transition-all hover:bg-white hover:border-slate-200 animate-slide">
                                        <div className="flex items-center gap-3.5">
                                            <div className="w-1.5 h-8 rounded-full" style={{ backgroundColor: CATEGORY_COLORS[item.category] || '#64748b' }}></div>
                                            <div>
                                                <h4 className="text-xs font-black text-slate-800 leading-tight">{item.title}</h4>
                                                <span className="text-[9px] font-bold text-slate-400 uppercase mt-0.5 block">{item.category}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center gap-4">
                                            <span className="text-xs font-black text-slate-900">-₹{item.amount}</span>
                                            <button 
                                                onClick={() => handleDeleteTransaction(item.id)}
                                                className="text-slate-300 hover:text-red-500 p-2 hover:bg-red-50 rounded-lg transition-colors flex items-center justify-center"
                                            >
                                                <TrashIcon />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
